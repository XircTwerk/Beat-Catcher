<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Beat Catcher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Main game canvas (fills viewport) -->
  <canvas id="gameCanvas"></canvas>

  <!-- CRT scanlines -->
  <div id="crt"></div>

  <!-- ===== MAIN MENU ===== -->
  <div id="screen-menu" class="overlay">
    <div class="overlay-content">

      <div class="logo">
        <span class="logo-beat">BEAT</span>
        <span class="logo-catcher">CATCHER</span>
      </div>

      <p class="tagline">Draw slashes. Slice beats. Feel the rhythm.</p>

      <!-- MP3 upload -->
      <div class="upload-row">
        <input type="file" id="mp3-input" accept="audio/mpeg,audio/mp3,audio/wav,audio/ogg" style="display:none">
        <button id="btn-upload" class="neon-btn upload-btn">♪ IMPORT TRACK</button>
        <span id="track-label" class="track-label">Built-in track</span>
      </div>

      <!-- Difficulty -->
      <div class="diff-row">
        <button class="diff-btn active" data-diff="easy">EASY</button>
        <button class="diff-btn" data-diff="medium">MEDIUM</button>
        <button class="diff-btn" data-diff="hard">HARD</button>
      </div>

      <button id="btn-play" class="neon-btn primary-btn">► PLAY</button>

      <div class="instructions">
        <p><span class="key">HOLD</span> mouse to draw &nbsp;·&nbsp; <span class="key">RELEASE</span> to slash</p>
        <p>Slash through beat circles before they expire · Missing costs health</p>
        <p><span class="key">ESC</span> to quit</p>
      </div>

    </div>
  </div>

  <!-- ===== LOADING ===== -->
  <div id="screen-loading" class="overlay hidden">
    <div class="overlay-content">
      <div class="logo-beat" style="font-size:52px;font-weight:900">ANALYZING</div>
      <div class="loading-bar-container">
        <div id="loading-bar-fill" class="loading-bar-fill"></div>
      </div>
      <p id="loading-status" class="tagline">Detecting beats…</p>
    </div>
  </div>

  <!-- ===== GAME OVER ===== -->
  <div id="screen-gameover" class="overlay hidden">
    <div class="overlay-content">
      <h1 class="gameover-title" id="gameover-heading">GAME OVER</h1>

      <div class="result-grid">
        <div class="result-item">
          <span class="result-label">SCORE</span>
          <span id="res-score"    class="result-value cyan">0</span>
        </div>
        <div class="result-item">
          <span class="result-label">MAX COMBO</span>
          <span id="res-combo"    class="result-value magenta">0</span>
        </div>
        <div class="result-item">
          <span class="result-label">ACCURACY</span>
          <span id="res-accuracy" class="result-value yellow">0%</span>
        </div>
        <div class="result-item">
          <span class="result-label">PERFECT</span>
          <span id="res-perfects" class="result-value cyan">0</span>
        </div>
        <div class="result-item">
          <span class="result-label">GOOD</span>
          <span id="res-goods"    class="result-value green">0</span>
        </div>
        <div class="result-item">
          <span class="result-label">MISS</span>
          <span id="res-misses"   class="result-value red">0</span>
        </div>
      </div>

      <div class="gameover-btns">
        <button id="btn-retry"  class="neon-btn primary-btn">► RETRY</button>
        <button id="btn-menu"   class="neon-btn">MENU</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
